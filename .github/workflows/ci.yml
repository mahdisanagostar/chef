name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CHEF_OFFLINE: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Smoke test CLI
        run: |
          ./bin/chef --help
          ./bin/chef restore-backup --help
          ./bin/chef pack-status --project .

      - name: Smoke test local runtime install
        run: |
          tmpdir="$(mktemp -d)"
          ./bin/chef init --project "$tmpdir" --host codex --vault new
          ./bin/chef install --project "$tmpdir" --host codex --offline
          ./bin/chef verify --project "$tmpdir"
